[build]
  publish = "."
  functions = "netlify/functions"

# Route /api/messages → Netlify Function (keeps App.jsx unchanged)
[[redirects]]
  from = "/api/messages"
  to = "/.netlify/functions/messages"
  status = 200

# SPA fallback — serve index.html for all unmatched routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
